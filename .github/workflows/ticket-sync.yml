name: Sync merged tickets

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  check:
    name: Check new ticket IDs do not already exist
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3
          cache: true

      - name: Check ticket ID conflicts with base branch
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TICKET_SYNC_REPO: ${{ github.repository }}
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          git fetch origin "${{ github.event.pull_request.base.ref }}:${{ github.event.pull_request.base.ref }}" || true
          git fetch origin "${{ github.event.pull_request.base.ref }}" || true

          mapfile -t changed_ticket_files < <(
            gh api "repos/${TICKET_SYNC_REPO}/pulls/${PR_NUMBER}/files" --paginate \
              --jq '.[] | select(.filename | test("^docs/project/tickets/AS(-Q)?-[0-9]+.*\\.md$")) | .filename'
          )

          tickets=()
          for file in "${changed_ticket_files[@]}"; do
            if [ -f "${file}" ]; then
              tickets+=("${file}")
            fi
          done

          if [ "${#tickets[@]}" -eq 0 ]; then
            echo "No ticket files changed in PR #${PR_NUMBER}; skipping ticket ID conflict check."
            exit 0
          fi

          go run ./cmd/ticket-sync -check-id-conflicts "${BASE_REF}" "${tickets[@]}"

  sync:
    name: Sync changed tickets to issues
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Check out merged code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3
          cache: true

      - name: Renumber merged ticket conflicts
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TICKET_SYNC_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t changed_ticket_files < <(
            gh api "repos/${TICKET_SYNC_REPO}/pulls/${PR_NUMBER}/files" --paginate \
              --jq '.[] | select(.filename | test("^docs/project/tickets/AS(-Q)?-[0-9]+.*\\.md$")) | .filename'
          )

          tickets=()
          for file in "${changed_ticket_files[@]}"; do
            if [ -f "${file}" ]; then
              tickets+=("${file}")
            else
              echo "Skipping deleted ticket file: ${file}"
            fi
          done

          if [ "${#tickets[@]}" -eq 0 ]; then
            echo "No ticket files changed in PR #${PR_NUMBER}; skipping renumber."
            exit 0
          fi

          go run ./cmd/ticket-sync -bump-id-conflicts HEAD^1 "${tickets[@]}"

          if [ -n "$(git status --porcelain docs/project/tickets)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/project/tickets
            git commit -m "chore(tickets): renumber merged ticket conflicts"
            git push origin "HEAD:${{ github.event.pull_request.base.ref }}"
          fi

      - name: Sync changed tickets
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TICKET_SYNC_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t changed_ticket_files < <(
            gh api "repos/${TICKET_SYNC_REPO}/pulls/${PR_NUMBER}/files" --paginate \
              --jq '.[] | select(.filename | test("^docs/project/tickets/AS(-Q)?-[0-9]+.*\\.md$")) | .filename'
          )

          tickets=()
          for file in "${changed_ticket_files[@]}"; do
            if [ -f "${file}" ]; then
              tickets+=("${file}")
              continue
            fi
            stem="$(basename "${file}")"
            prefix="${stem%%-*}"
            match="$(find docs/project/tickets -maxdepth 1 -type f -name "AS-*-${stem#*-}" | head -n 1 || true)"
            if [ -n "${match}" ]; then
              tickets+=("${match}")
            else
              echo "Skipping deleted ticket file: ${file}"
            fi
          done

          if [ "${#tickets[@]}" -eq 0 ]; then
            echo "No ticket files changed in PR #${PR_NUMBER}; skipping issue sync."
            exit 0
          fi

          printf 'Syncing %d ticket file(s):\n' "${#tickets[@]}"
          printf ' - %s\n' "${tickets[@]}"

          # Update already-linked issues; quietly skip tickets that still have
          # github_issue: null — the scheduled sync (ticket-sync-scheduled.yml)
          # creates their issues and commits the numbers back to the repo. This
          # keeps the merge job from failing on freshly-added, unlinked tickets.
          go run ./cmd/ticket-sync -repo "${TICKET_SYNC_REPO}" -skip-unlinked "${tickets[@]}"
