name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  GO_VERSION: 1.26.3

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build release archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          archive_root="smith_${VERSION#v}_${GOOS}_${GOARCH}"
          stage_dir="dist/${archive_root}"
          archive_path="dist/${archive_root}.tar.gz"

          mkdir -p "${stage_dir}"
          VERSION="${VERSION}" GOOS="${GOOS}" GOARCH="${GOARCH}" BINARY="${stage_dir}/smith" make build
          cp README.md LICENSE "${stage_dir}/"
          tar -C "${stage_dir}" -czf "${archive_path}" smith README.md LICENSE

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download release archives
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          checksum_file="dist/smith_${VERSION#v}_checksums.txt"
          (
            cd dist
            sha256sum ./*.tar.gz > "$(basename "${checksum_file}")"
          )

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG}" --repo "${REPO}" >/dev/null 2>&1; then
            gh release upload "${TAG}" dist/* --repo "${REPO}" --clobber
          else
            gh release create "${TAG}" dist/* --repo "${REPO}" --title "${TAG}" --generate-notes
          fi
